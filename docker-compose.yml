services:
  # ── MySQL 8 ──────────────────────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: booking_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-booking_sync}
    ports:
      - '3306:3306'
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost', '-u', 'root', '--password=${MYSQL_ROOT_PASSWORD:-root}']
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 20s

  # ── Redis 7 ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: booking_redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  # ── PMS Simulator (Golang) ───────────────────────────────────────────────────
  pms-simulator:
    build:
      context: ./pms-simulator
      dockerfile: Dockerfile
    container_name: booking_pms
    restart: unless-stopped
    ports:
      - '8080:8080'
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:8080/health || exit 1']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  # ── Booking Processor (Node.js) ──────────────────────────────────────────────
  booking-processor:
    build:
      context: ./booking-processor
      dockerfile: Dockerfile
    container_name: booking_processor
    restart: unless-stopped
    ports:
      - '3001:3001'
    environment:
      PORT: 3001
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      DB_NAME: ${MYSQL_DATABASE:-booking_sync}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      PMS_URL: http://pms-simulator:8080
      POLL_INTERVAL_MS: ${POLL_INTERVAL_MS:-30000}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      pms-simulator:
        condition: service_healthy

volumes:
  mysql_data:
  redis_data:
